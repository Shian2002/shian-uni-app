  <style>
    :root {
      color: #77736a;
    }
    .ziwei-layer-1 {
      transform-origin: 360px 360px;
      animation: ziweiClockwise 22s linear infinite;
    }
    .ziwei-layer-2 {
      transform-origin: 360px 360px;
      animation: ziweiCounter 38s linear infinite;
    }
    .ziwei-layer-3 {
      transform-origin: 360px 360px;
      animation: ziweiClockwise 54s linear infinite;
    }
    .ziwei-layer-4 {
      transform-origin: 360px 360px;
      animation: ziweiCounter 72s linear infinite;
    }
    @keyframes ziweiClockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes ziweiCounter {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
  </style>

