<svg xmlns="http://www.w3.org/2000/svg" width="820" height="820" viewBox="0 0 820 820" fill="none">
  <rect width="820" height="820" fill="#F5F2EA"/>

  <defs>
    <style>
      .line { stroke: #10100F; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .black { fill: #10100F; }
      .white { fill: #F5F2EA; stroke: #10100F; stroke-width: 2.4; }
    </style>
  </defs>

  <!-- 以 410,410 为中心，外轮廓按正方形/近圆包络校准，旋转时更稳定 -->

  <!-- 上方：七个空心点 -->
  <path class="line" d="M230 120H590"/>
  <circle class="white" cx="230" cy="120" r="10.5"/>
  <circle class="white" cx="290" cy="120" r="10.5"/>
  <circle class="white" cx="350" cy="120" r="10.5"/>
  <circle class="white" cx="410" cy="120" r="10.5"/>
  <circle class="white" cx="470" cy="120" r="10.5"/>
  <circle class="white" cx="530" cy="120" r="10.5"/>
  <circle class="white" cx="590" cy="120" r="10.5"/>

  <!-- 上中：二黑点 -->
  <path class="line" d="M350 188H470"/>
  <circle class="black" cx="350" cy="188" r="11"/>
  <circle class="black" cx="470" cy="188" r="11"/>

  <!-- 左侧：八黑点竖列 -->
  <path class="line" d="M105 228V572"/>
  <circle class="black" cx="105" cy="228" r="11"/>
  <circle class="black" cx="105" cy="277" r="11"/>
  <circle class="black" cx="105" cy="326" r="11"/>
  <circle class="black" cx="105" cy="375" r="11"/>
  <circle class="black" cx="105" cy="424" r="11"/>
  <circle class="black" cx="105" cy="473" r="11"/>
  <circle class="black" cx="105" cy="522" r="11"/>
  <circle class="black" cx="105" cy="572" r="11"/>

  <!-- 左中：三空心点 -->
  <path class="line" d="M205 314V456"/>
  <circle class="white" cx="205" cy="314" r="10.5"/>
  <circle class="white" cx="205" cy="385" r="10.5"/>
  <circle class="white" cx="205" cy="456" r="10.5"/>

  <!-- 中央：五黑点方框 -->
  <path class="line" d="M270 286H550V526H270Z"/>
  <path class="line" d="M270 286H550"/>
  <path class="line" d="M270 526H550"/>
  <circle class="black" cx="270" cy="286" r="11"/>
  <circle class="black" cx="340" cy="286" r="11"/>
  <circle class="black" cx="410" cy="286" r="11"/>
  <circle class="black" cx="480" cy="286" r="11"/>
  <circle class="black" cx="550" cy="286" r="11"/>
  <circle class="black" cx="270" cy="526" r="11"/>
  <circle class="black" cx="340" cy="526" r="11"/>
  <circle class="black" cx="410" cy="526" r="11"/>
  <circle class="black" cx="480" cy="526" r="11"/>
  <circle class="black" cx="550" cy="526" r="11"/>

  <!-- 正中：五空心点十字 -->
  <path class="line" d="M410 350V470"/>
  <path class="line" d="M350 410H470"/>
  <circle class="white" cx="410" cy="350" r="10.5"/>
  <circle class="white" cx="410" cy="410" r="10.5"/>
  <circle class="white" cx="410" cy="470" r="10.5"/>
  <circle class="white" cx="350" cy="410" r="10.5"/>
  <circle class="white" cx="470" cy="410" r="10.5"/>

  <!-- 下中：单独空心点 -->
  <circle class="white" cx="410" cy="610" r="10.5"/>

  <!-- 右中：四黑点竖列 -->
  <path class="line" d="M615 326V506"/>
  <circle class="black" cx="615" cy="326" r="11"/>
  <circle class="black" cx="615" cy="386" r="11"/>
  <circle class="black" cx="615" cy="446" r="11"/>
  <circle class="black" cx="615" cy="506" r="11"/>

  <!-- 右侧：九空心点竖列 -->
  <path class="line" d="M715 228V572"/>
  <circle class="white" cx="715" cy="228" r="10.5"/>
  <circle class="white" cx="715" cy="271" r="10.5"/>
  <circle class="white" cx="715" cy="314" r="10.5"/>
  <circle class="white" cx="715" cy="357" r="10.5"/>
  <circle class="white" cx="715" cy="400" r="10.5"/>
  <circle class="white" cx="715" cy="443" r="10.5"/>
  <circle class="white" cx="715" cy="486" r="10.5"/>
  <circle class="white" cx="715" cy="529" r="10.5"/>
  <circle class="white" cx="715" cy="572" r="10.5"/>

  <!-- 底部：六黑点横列 -->
  <path class="line" d="M235 700H585"/>
  <circle class="black" cx="235" cy="700" r="11"/>
  <circle class="black" cx="305" cy="700" r="11"/>
  <circle class="black" cx="375" cy="700" r="11"/>
  <circle class="black" cx="445" cy="700" r="11"/>
  <circle class="black" cx="515" cy="700" r="11"/>
  <circle class="black" cx="585" cy="700" r="11"/>
</svg>
