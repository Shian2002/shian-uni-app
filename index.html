<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>时安解忧屋</title>
  <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg?v=8">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/images/favicon-16.png?v=8">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32.png?v=8">
  <link rel="icon" type="image/png" sizes="48x48" href="/static/images/favicon-48.png?v=8">
  <link rel="shortcut icon" href="/static/images/favicon.ico?v=8">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/images/apple-touch-icon.png?v=8">
  <link rel="preload" href="/static/images/logo.svg?v=7" as="image" type="image/svg+xml">
  <!--preload-links-->
  <!--app-context-->
  <style>html,body{background:#f8f5f0!important;color:#1f1b14;color-scheme:light}#app{min-height:100vh;background:#f8f5f0}#xc-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#f8f5f0;z-index:999999}#xc-overlay .xc-img{position:absolute;top:calc(50% - 40px);left:50%;margin-left:-40px;width:80px;height:80px;border-radius:50%;object-fit:cover;animation:xc-rotate 1s linear infinite;box-shadow:0 0 30px rgba(0,0,0,.06)}#xc-overlay .xc-tx{position:absolute;top:calc(50% + 50px);left:0;width:100%;text-align:center;font-size:13px;color:#b8a088}#xc-boot-fallback{display:none;position:fixed;inset:0;z-index:999998;background:#f8f5f0;color:#4b3b26;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-align:center;padding:34vh 24px 0;box-sizing:border-box}#xc-boot-fallback .xc-title{font-size:20px;font-weight:700;margin-bottom:10px}#xc-boot-fallback .xc-desc{font-size:14px;color:#8a7454;margin-bottom:18px}.xc-reload-btn{border:0;border-radius:999px;background:#8a631f;color:#fff;padding:10px 22px;font-size:14px;cursor:pointer}@keyframes xc-rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>
</head>
<body>
  <div id="app"><!--app-html--></div>
  <div id="xc-overlay"><img class="xc-img" src="/static/images/logo.svg?v=7" alt=""><div class="xc-tx">时安解忧屋</div></div>
  <div id="xc-boot-fallback"><div class="xc-title">页面加载异常</div><div class="xc-desc">当前资源没有正常启动，请重新加载页面。</div><button class="xc-reload-btn" type="button" onclick="location.reload()">重新加载</button></div>
  <script>
    (function(){
      var o = document.getElementById('xc-overlay');
      var f = document.getElementById('xc-boot-fallback');
      var bootFailed = false;
      function getAppText(){
        var app=document.getElementById('app');
        return app&&app.innerText ? app.innerText.replace(/\s/g,'') : '';
      }
      function hideFallbackIfAppReady(){
        if(getAppText()){
          bootFailed = false;
          if(f)f.style.display='none';
          if(o)o.style.display='none';
          var a=document.getElementById('app');
          if(a)a.style.setProperty('visibility','visible','important');
          return true;
        }
        return false;
      }
      function markBootFailed(){
        if(hideFallbackIfAppReady())return;
        bootFailed = true;
        if(o)o.style.display='none';
        if(f) f.style.display='block';
      }
      window.addEventListener('error', function(e){
        var target = e && e.target;
        if(target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK')) markBootFailed();
      }, true);
      window.addEventListener('unhandledrejection', function(e){
        var msg = e && e.reason && (e.reason.message || String(e.reason));
        if(msg && (/Failed to fetch dynamically imported module|Importing a module script failed|Loading chunk|NetworkError/i).test(msg)) markBootFailed();
      });
      function hide(){
        if(bootFailed && !hideFallbackIfAppReady())return;
        if(!o)return;
        o.style.display='none';
        if(f)f.style.display='none';
        var a=document.getElementById('app');
        if(a)a.style.setProperty('visibility','visible','important');
      }
      var t = setInterval(function(){
        if(hideFallbackIfAppReady()){
          clearInterval(t);
          return;
        }
        var nav = document.querySelector('.topnav,.topnav-wrap,.marketing-nav');
        if(!nav)return;
        var btn = nav.querySelector('.nav-btn');
        var cssOk = !btn || parseFloat(getComputedStyle(btn).borderRadius) >= 7;
        if(nav.children.length > 0 && cssOk){
          clearInterval(t);
          setTimeout(hide,120);
        }
      }, 60);
      var readyChecks = 0;
      var readyTimer = setInterval(function(){
        readyChecks++;
        if(hideFallbackIfAppReady() || readyChecks > 250) clearInterval(readyTimer);
      }, 120);
      try {
        var appNode = document.getElementById('app');
        if (appNode && typeof MutationObserver !== 'undefined') {
          var appObserver = new MutationObserver(function(){
            if (hideFallbackIfAppReady()) appObserver.disconnect();
          });
          appObserver.observe(appNode, { childList: true, subtree: true, characterData: true });
          setTimeout(function(){ try { appObserver.disconnect(); } catch(_) {} }, 30000);
        }
      } catch(_) {}
      setTimeout(function(){
        clearInterval(t);
        clearInterval(readyTimer);
        hide();
        setTimeout(function(){
          if(!getAppText()) markBootFailed();
          else hideFallbackIfAppReady();
        }, 1200);
      }, 1500);
    })();
  </script>
  <script src="/static/js/sidebar-types.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
