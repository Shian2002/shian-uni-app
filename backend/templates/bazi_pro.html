<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问真八字 · 专业细盘</title>
<style>
/* ========== Reset & Base ========== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Helvetica Neue,Helvetica,PingFang SC,Hiragino Sans GB,Microsoft YaHei,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:#f5f5f7;color:#101010;text-align:center}
.columnFlex{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ========== 问真八字原生色彩 ========== */
.mainColor{color:#b2955d}
.paipanTitleColor{color:#9e9e9e}
.fireColor{color:#d30505}
.waterColor{color:#2e83f6}
.woodColor{color:#07e930}
.goldColor{color:#ef9104}
.soilColor{color:#8b6d03}
.greyBg{background:#f5f5f7}

/* ========== 头部信息栏 ========== */
.header-container{background:linear-gradient(135deg,#f8f4ed 0%,#ede4d3 100%);border-radius:10px;margin:12px 16px;padding:20px 24px;display:flex;align-items:center;gap:16px}
.header-avatar{width:50px;height:50px;border-radius:50%;background:#e8dcc8;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.header-username{font-size:25px;font-weight:500;color:#101010;margin-right:12px;white-space:nowrap}
.header-calendar{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.header-calendar-text{font-size:13px;color:#666;text-align:left}
.header-tms{margin-left:auto;display:flex;align-items:center;gap:4px;cursor:pointer;font-size:13px;color:#b2955d}
.header-edit{cursor:pointer;margin-left:8px;font-size:13px;color:#999}

/* ========== 专业细盘主布局 ========== */
.pro-pan-content{display:flex;flex-direction:row;gap:12px;padding:0 16px 12px}
.pro-pan-content-left{flex:1 1 0%;background:#fff;border-radius:10px;padding:10px 0}
.pro-pan-content-right{flex:0 1 auto;width:520px;background:#fff;border-radius:10px;padding:10px}

/* ========== 左侧排盘表格 ========== */
.pro-pan-content-table{display:flex;flex-direction:column}
.pro-pan-row{display:flex;align-items:stretch;min-height:27px}
.pro-pan-row-item{flex:1 1 0%;display:flex;align-items:center;justify-content:center;font-size:15px;padding:2px 0;position:relative}
.pro-pan-row-item.shadowBoder{border-right:1px solid #f0f0f0}
.pro-pan-row-item.shadowBoder:last-child{border-right:none}
.pro-pan-row-item.label-cell{color:#9e9e9e;font-size:14px;flex:0 0 88px;max-width:88px;min-width:88px}

/* 天干行 */
.pro-pan-row.tg-row .pro-pan-row-item{font-size:22px;font-weight:600;padding:6px 0}
/* 地支行 */
.pro-pan-row.dz-row .pro-pan-row-item{font-size:22px;font-weight:600;padding:8px 0}
/* 藏干行 */
.pro-pan-row.cg-row{background:#f5f5f7;padding:4px 0}
.pro-pan-row.cg-row .pro-pan-row-item{flex-direction:column;gap:1px;font-size:13px}
.canggan-item{display:flex;align-items:center;gap:2px;line-height:1.4}
.canggan-shishen{font-size:11px;color:#999}
/* 神煞分割线 */
.shensha_division{height:11px;background:#f8f8f8}
/* 神煞行 */
.pro-pan-row.ss-row .pro-pan-row-item{flex-direction:column;align-items:center;gap:2px;font-size:12px;line-height:1.5;padding:4px 2px}
.shensha-tag{display:inline-block;font-size:12px;color:#666;line-height:1.6}

/* ========== 右侧面板 ========== */
.pro-pan-content-bg{display:flex;flex-direction:column;gap:6px}
.pro-pan-qiyun{font-size:12px;color:#101010;text-align:left;padding:8px 4px;line-height:1.6;border-bottom:1px solid #f0f0f0}
.pro-pan-yun{display:flex;border-bottom:1px solid #f5f5f7}
.pro-pan-yun:last-child{border-bottom:none}
.pro-pan-yun-items{display:flex;overflow-x:auto;flex:1;gap:0}
.pro-pan-yun-item{display:flex;flex-direction:column;align-items:center;padding:4px 2px;font-size:12px;min-width:47px;cursor:pointer;flex-shrink:0}
.pro-pan-yun-item.yun-index{background:#f8f4ed;border-radius:4px;min-width:50px;font-weight:500;color:#b2955d;font-size:13px;flex-shrink:0}
.pro-pan-yun-item-small{font-size:10px;color:#999;display:block}
.pro-pan-yun-item-label{display:flex;flex-direction:column;align-items:center;gap:0;margin-top:2px}
.pro-pan-yun-item-text{font-size:14px;font-weight:500}
.pro-pan-yun-item-shishen{font-size:10px;color:#999}
/* 五行旺度 */
.pro-pan-wuxing{background:#b2955d;border-radius:6px;padding:8px 12px;display:flex;align-items:center;justify-content:center;gap:16px;color:#fff;font-size:14px;font-weight:500}
.pro-pan-wuxing-item{padding:2px 8px;border-radius:4px}

/* ========== 干支留意 ========== */
.sizhu-gztip{background:#fff;border-radius:10px;margin:0 16px 8px;padding:14px 20px;text-align:left;font-size:13px;color:#666;line-height:1.8}
.sizhu-gztip .mainColor{font-weight:500}

/* ========== 智能四柱图示 ========== */
.wzbz-box{background:#fff;border-radius:10px;margin:0 16px 16px;overflow:hidden}
.wzbz_header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #f0f0f0}
.wzbz_header_title{font-size:15px;font-weight:500;color:#333}
.wzbz_header_list{display:flex;gap:16px;font-size:13px;color:#b2955d}
.wzbz_header_list span{cursor:pointer;padding:2px 8px;border-radius:4px}
.wzbz_header_list span.active{background:#f8f4ed;font-weight:500}
.wzbz_content{padding:16px 20px;min-height:400px;font-size:13px;color:#666;line-height:1.8}

/* 当前大运高亮 */
.pro-pan-yun-item.current-dayun{background:#f8f4ed;border-radius:4px}
</style>
</head>
<body>

<!-- ==================== 头部信息栏 ==================== -->
<div class="header-container">
  <div class="header-avatar" id="avatar"></div>
  <div class="header-username" id="header_name" style="font-size:25px;"></div>
  <div class="header-calendar columnFlex">
    <div class="header-calendar-text" id="header_lunar"></div>
    <div class="header-calendar-text" id="header_solar"></div>
  </div>
  <div class="header-tms">胎命身</div>
  <div class="header-edit">✎</div>
</div>

<!-- ==================== 专业细盘主内容 ==================== -->
<div class="pro-pan-content">

  <!-- ====== 左侧排盘表 ====== -->
  <div class="pro-pan-content-left">
    <div class="pro-pan-content-table" id="pan_table">
      <!-- JS 动态生成排盘表格 -->
    </div>
  </div>

  <!-- ====== 右侧面板 ====== -->
  <div class="pro-pan-content-right">
    <div class="pro-pan-content-bg">
      <!-- 起运信息 -->
      <div class="pro-pan-qiyun" id="qiyun_info"></div>
      <!-- 大运 -->
      <div class="pro-pan-yun" id="dayun_row"></div>
      <!-- 流年 -->
      <div class="pro-pan-yun" id="liunian_row"></div>
      <!-- 小运 -->
      <div class="pro-pan-yun" id="xiaoyun_row"></div>
      <!-- 流月 -->
      <div class="pro-pan-yun" id="liuyue_row"></div>
    </div>
    <!-- 五行旺度 -->
    <div class="pro-pan-wuxing" id="wuxing_wangdu"></div>
  </div>
</div>

<!-- ==================== 干支留意 ==================== -->
<div class="sizhu-gztip" id="gztip"></div>

<!-- ==================== 智能四柱图示 ==================== -->
<div class="wzbz-box">
  <div class="wzbz_header">
    <div class="wzbz_header_title">智能四柱图示</div>
    <div class="wzbz_header_list">
      <span class="active">干支流通</span>
      <span>宫位</span>
      <span>六亲</span>
    </div>
  </div>
  <div class="wzbz_content" id="wzbz_content"></div>
</div>

<script>
/* ========== 五行映射 ========== */
const WX={甲:'wood',乙:'wood',寅:'wood',卯:'wood',丙:'fire',丁:'fire',巳:'fire',午:'fire',戊:'soil',己:'soil',辰:'soil',丑:'soil',未:'soil',戌:'soil',庚:'gold',辛:'gold',申:'gold',酉:'gold',壬:'water',癸:'water',亥:'water',子:'water'};

function wxSpan(gz){const w=WX[gz];return w?`<span class="${w}Color">${gz}</span>`:gz}
function cgItem(gz,ss){return `<div class="canggan-item">${wxSpan(gz)}<span class="canggan-shishen">${ss}</span></div>`}
function ssTag(name){return `<span class="shensha-tag">${name}</span>`}

/* ========== 生成左侧排盘表格 ========== */
function renderPanTable(data){
  const sz=data.sizhu;
  const cols=['liunian','xiaoyun','dayun','year','month','day','hour'];
  const labels=['流年','小运','大运','年柱','月柱','日柱','时柱'];
  const rows=[
    {label:'主星',key:'ss',cls:''},
    {label:'天干',key:'tg',cls:'tg-row'},
    {label:'地支',key:'dz',cls:'dz-row'},
    {label:'藏干',key:'cg',cls:'cg-row greyBg'},
    {label:'星运',key:'xy',cls:''},
    {label:'自坐',key:'zz',cls:''},
    {label:'空亡',key:'kw',cls:''},
    {label:'纳音',key:'ny',cls:''}
  ];

  let html='';
  // 标题行
  html+='<div class="pro-pan-row">';
  html+='<div class="pro-pan-row-item label-cell">日期</div>';
  labels.forEach((l,i)=>{
    const bdr=i<6?' shadowBoder':'';
    html+=`<div class="pro-pan-row-item paipanTitleColor${bdr}">${l}</div>`;
  });
  html+='</div>';

  rows.forEach(row=>{
    html+=`<div class="pro-pan-row ${row.cls}">`;
    html+=`<div class="pro-pan-row-item label-cell">${row.label}</div>`;
    cols.forEach((c,i)=>{
      const d=sz[c]||{};
      const bdr=i<6?' shadowBoder':'';
      if(row.key==='tg'){
        html+=`<div class="pro-pan-row-item${bdr}">${wxSpan(d.tg||'')}</div>`;
      }else if(row.key==='dz'){
        html+=`<div class="pro-pan-row-item${bdr}">${wxSpan(d.dz||'')}</div>`;
      }else if(row.key==='ss'){
        html+=`<div class="pro-pan-row-item${bdr}">${d.ss||''}</div>`;
      }else if(row.key==='cg'){
        const cgs=(d.canggan||[]).map(x=>cgItem(x.gz,x.ss)).join('');
        html+=`<div class="pro-pan-row-item${bdr} columnFlex">${cgs}</div>`;
      }else if(row.key==='xy'){
        html+=`<div class="pro-pan-row-item${bdr}">${d.xingyun||''}</div>`;
      }else if(row.key==='zz'){
        html+=`<div class="pro-pan-row-item${bdr}">${d.zizuo||''}</div>`;
      }else if(row.key==='kw'){
        html+=`<div class="pro-pan-row-item${bdr}">${d.kongwang||''}</div>`;
      }else if(row.key==='ny'){
        html+=`<div class="pro-pan-row-item${bdr}">${d.nayin||''}</div>`;
      }
    });
    html+='</div>';
  });

  // 神煞分割线
  html+='<div class="shensha_division"></div>';

  // 神煞行
  html+='<div class="pro-pan-row ss-row">';
  html+='<div class="pro-pan-row-item label-cell">神煞</div>';
  cols.forEach((c,i)=>{
    const d=sz[c]||{};
    const bdr=i<6?' shadowBoder':'';
    const tags=(d.shensha||[]).map(s=>ssTag(s)).join('');
    html+=`<div class="pro-pan-row-item${bdr} columnFlex">${tags}</div>`;
  });
  html+='</div>';

  document.getElementById('pan_table').innerHTML=html;
}

/* ========== 生成右侧大运/流年/流月 ========== */
function renderYunItem(item,isFirst,isLiuyue){
  if(isFirst){
    return `<div class="pro-pan-yun-item yun-index">${item.label||''}</div>`;
  }
  // 流月行：显示节气名+日期，而非年份
  let yearHtml;
  if(isLiuyue && (item.jieqi || item.date)){
    const jq=item.jieqi||'';
    const dt=item.date||'';
    yearHtml=`<span class="pro-pan-yun-item-small">${jq} ${dt}</span>`;
  }else{
    yearHtml=item.year?`<span class="pro-pan-yun-item-small">${item.year}</span>`:'';
  }
  const ageHtml=item.age?`<span class="pro-pan-yun-item-small" style="margin-top:4px;">${item.age}</span>`:'';
  const tgLabel=item.tg?`<div class="pro-pan-yun-item-label"><span class="pro-pan-yun-item-text">${wxSpan(item.tg)}</span>${item.tgSs?`<span class="pro-pan-yun-item-shishen">${item.tgSs}</span>`:''}</div>`:'';
  const dzLabel=item.dz?`<div class="pro-pan-yun-item-label"><span class="pro-pan-yun-item-text">${wxSpan(item.dz)}</span>${item.dzSs?`<span class="pro-pan-yun-item-shishen">${item.dzSs}</span>`:''}</div>`:'';
  return `<div class="pro-pan-yun-item pointer${item.current?' current-dayun':''}">${yearHtml}${ageHtml}${tgLabel}${dzLabel}</div>`;
}

function renderYunRow(label, items, isLiuyue){
  let html=`<div class="pro-pan-yun-item yun-index">${label}</div>`;
  html+='<div class="pro-pan-yun-items">';
  (items||[]).forEach(item=>{html+=renderYunItem(item,false,isLiuyue)});
  html+='</div>';
  return html;
}

/* ========== 主注入函数 ========== */
function injectBaziData(data){
  // 头部
  document.getElementById('header_name').textContent=data.name||'';
  document.getElementById('header_lunar').innerHTML=`阴历：${data.lunar_date||''} <span class="mainColor">（${data.gender_label||''}）</span>`;
  document.getElementById('header_solar').textContent=`阳历：${data.solar_date||''}`;
  document.getElementById('avatar').textContent=data.shengxiao||'';

  // 起运信息
  document.getElementById('qiyun_info').innerHTML=`起运： ${data.qiyun_info||''} &nbsp;&nbsp; 交运： ${data.jiaoyun_info||''}`;

  // 左侧排盘表
  renderPanTable(data);

  // 大运
  document.getElementById('dayun_row').innerHTML=renderYunRow('大运',data.dayun_list);
  // 流年
  document.getElementById('liunian_row').innerHTML=renderYunRow('流年',data.liunian_list);
  // 小运
  document.getElementById('xiaoyun_row').innerHTML=renderYunRow('小运',data.xiaoyun_list||[]);
  // 流月（节气标注模式）
  document.getElementById('liuyue_row').innerHTML=renderYunRow('流月',data.liuyue_list,true);

  // 五行旺度
  const wd=data.wuxing_wangdu||{};
  document.getElementById('wuxing_wangdu').innerHTML=`
    <div class="pro-pan-wuxing-item">水${wd.water||''}</div>
    <div class="pro-pan-wuxing-item">木${wd.wood||''}</div>
    <div class="pro-pan-wuxing-item">金${wd.gold||''}</div>
    <div class="pro-pan-wuxing-item">土${wd.soil||''}</div>
    <div class="pro-pan-wuxing-item">火${wd.fire||''}</div>`;

  // 干支留意
  document.getElementById('gztip').innerHTML=`
    <div>天干留意：&nbsp; <span class="mainColor">${data.tg_guanxi||''}</span></div>
    <div>地支留意：&nbsp; <span class="mainColor">${data.dz_guanxi||''}</span></div>`;

  // 智能四柱图示
  const wzbz=document.getElementById('wzbz_content');
  if(data.wzbz_chart) wzbz.innerHTML=data.wzbz_chart;

  console.log('[问真八字] 专业细盘数据注入完成');
}

window.injectBaziData=injectBaziData;

/* ========== 示例数据（模板预览） ========== */

    sizhu:{
      liunian:{tg:'丙',dz:'午',ss:'比肩',canggan:[{gz:'丁',ss:'劫财'},{gz:'己',ss:'伤官'}],xingyun:'帝旺',zizuo:'帝旺',kongwang:'寅卯',nayin:'天河水',shensha:['德秀贵人','羊刃','桃花','血刃','将星']},
      xiaoyun:{tg:'乙',dz:'丑',ss:'正印',canggan:[{gz:'己',ss:'伤官'},{gz:'癸',ss:'正官'},{gz:'辛',ss:'正财'}],xingyun:'养',zizuo:'养',kongwang:'戌亥',nayin:'海中金',shensha:[]},
      dayun:{tg:'癸',dz:'酉',ss:'正官',canggan:[{gz:'辛',ss:'正财'}],xingyun:'死',zizuo:'病',kongwang:'戌亥',nayin:'剑锋金',shensha:['文昌贵人','天厨贵人','天乙贵人','太极贵人','德秀贵人','将星']},
      year:{tg:'己',dz:'巳',ss:'伤官',canggan:[{gz:'丙',ss:'比肩'},{gz:'庚',ss:'偏财'},{gz:'戊',ss:'食神'}],xingyun:'临官',zizuo:'帝旺',kongwang:'戌亥',nayin:'大林木',shensha:['天厨贵人','德秀贵人','天德贵人','禄神','亡神']},
      month:{tg:'丙',dz:'子',ss:'比肩',canggan:[{gz:'癸',ss:'正官'}],xingyun:'胎',zizuo:'胎',kongwang:'申酉',nayin:'涧下水',shensha:['天乙贵人','福星贵人','德秀贵人','飞刃']},

      {year:'1998',age:'9岁',tg:'乙',tgSs:'印',dz:'亥',dzSs:'杀'},
      {year:'2008',age:'19岁',tg:'甲',tgSs:'枭',dz:'戌',dzSs:'食'},

    liunian_list:[

      {year:'2019',tg:'己',tgSs:'伤',dz:'亥',dzSs:'杀'},
      {year:'2020',tg:'庚',tgSs:'才',dz:'子',dzSs:'官'},

    ],
